name: Release

on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at 12:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip CI preflight check and release anyway'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify latest CI Pipeline on main succeeded
        if: ${{ !inputs.force }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CONCLUSION=$(gh run list \
            --workflow "CI Pipeline" \
            --branch main \
            --event push \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')
          echo "Latest CI Pipeline conclusion on main: ${CONCLUSION:-<none>}"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Latest CI Pipeline run on main is '$CONCLUSION' — refusing to release."
            exit 1
          fi

      - name: Semantic Release
        id: semrel
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        if: steps.semrel.outputs.new_release_published == 'true'
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push slim image
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:v${{ steps.semrel.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim

      - name: Build and push alpine image
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-alpine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:v${{ steps.semrel.outputs.new_release_version }}-alpine
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:alpine
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=alpine
